<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apply - {{ position.title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">
  <!-- Header -->
  <header class="bg-slate-800 border-b border-white/5 py-6 px-8 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center font-bold text-xl text-white shadow-lg shadow-indigo-500/30">C</div>
      <div>
        <h1 class="text-xl font-bold">CorpHRM Careers</h1>
      </div>
    </div>
    <a href="/careers" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">← Back to Openings</a>
  </header>

  <!-- Main Content -->
  <main class="max-w-3xl mx-auto py-12 px-8">
    <div class="mb-10 text-center">
      <h2 class="text-3xl font-extrabold text-white mb-2">Apply for {{ position.title }}</h2>
      <div class="flex items-center justify-center gap-2">
        <span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-indigo-500/10 text-indigo-400">{{ position.level }}</span>
        <span class="text-slate-500 text-xs">•</span>
        <span class="text-slate-400 text-sm">{{ position.team_dept }}</span>
      </div>
    </div>

    <div class="bg-slate-800/50 border border-white/5 rounded-2xl p-8">
      <form action="/careers/submit" method="POST" enctype="multipart/form-data" class="space-y-6">
        <input type="hidden" name="position_id" value="{{ position.id }}">
        <input type="hidden" name="job_title" value="{{ position.title }}">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">First Name</label>
            <input type="text" name="first_name" required class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Last Name</label>
            <input type="text" name="last_name" required class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
          <input type="email" name="email" required class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Resume (PDF Only)</label>
          <div class="border-2 border-dashed border-white/10 rounded-xl p-8 text-center hover:border-indigo-500/50 transition-colors bg-slate-900/50">
            <input type="file" name="resume" accept=".pdf" required class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-500/10 file:text-indigo-400 hover:file:bg-indigo-500/20 transition-all">
            <p class="text-xs text-slate-500 mt-2">Max file size: 5MB</p>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Cover Letter / Notes (Optional)</label>
          <textarea name="notes" rows="3" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"></textarea>
        </div>

        <div class="pt-4 border-t border-white/5">
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-base font-bold py-3 rounded-xl transition-all shadow-lg hover:shadow-indigo-500/25">Submit Application</button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
