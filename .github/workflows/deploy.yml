name: Deploy to GCP VM

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH to GCP
      uses: appleboy/ssh-action@v1.0.3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        host: ${{ secrets.GCP_VM_IP }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        envs: GITHUB_TOKEN
        script: |
          # 1. Navigate to project folder
          cd /var/www/hrm_react
          
          # 2. Pull latest code from GitHub (init if first time)
          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://x-access-token:$GITHUB_TOKEN@github.com/PhyoeThuta/HRM_V1.1.git
          else
            git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/PhyoeThuta/HRM_V1.1.git
          fi
          
          git fetch --all
          git reset --hard origin/main
          
          # 3. Build React Frontend
          echo "Building Frontend..."
          cd hrm-client
          npm install
          npm run build
          
          # Start Frontend via PM2 (in case Nginx proxies to it)
          pm2 delete hrm_react_client || true
          pm2 start npm --name "hrm_react_client" -- run preview -- --port 4173
          
          # 4. Setup and Restart Node.js Backend
          echo "Restarting Backend API..."
          cd ../server
          
          # Install Puppeteer Chromium dependencies (Ubuntu/Debian)
          sudo apt-get update || true
          sudo apt-get install -yq fonts-sil-padauk fonts-noto-core fonts-noto-cjk libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 libcairo2 libpango-1.0-0 || true

          npm install --no-audit --no-fund
          
          # Delete only the specific backend process instead of 'all' to prevent killing other services
          pm2 delete hrm_react_api || true
          pm2 start index.js --name "hrm_react_api"
          pm2 save
          
          echo "Deployment Successful!"
