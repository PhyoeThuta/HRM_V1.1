name: Deploy to GCP VM

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH to GCP
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.GCP_VM_IP }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        script: |
          # 1. Navigate to project folder
          cd /var/www/hrm_react
          
          # 2. Pull latest code from GitHub (init if first time)
          if [ ! -d ".git" ]; then
            git init
            git remote add origin git@github.com:PhyoeThuta/HRM_V1.1.git
          else
            git remote set-url origin git@github.com:PhyoeThuta/HRM_V1.1.git
          fi
          
          git fetch --all
          git reset --hard origin/main
          
          # 3. Build React Frontend
          echo "Building Frontend..."
          cd hrm-client
          npm install
          npm run build
          
          # 4. Setup and Restart Node.js Backend
          echo "Restarting Backend API..."
          cd ../server
          npm install
          # Forcibly restart all pm2 processes to guarantee the old process is updated with new code
          pm2 restart all || pm2 start index.js --name "hrm-api"
          pm2 save
          
          echo "Deployment Successful!"
